<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Fake News Detector</title>
  <style>
    body        { font-family: Arial, sans-serif; max-width: 700px; margin: 60px auto; padding: 0 20px; background: #f9fafb; }
    h1          { color: #1e293b; }
    p           { color: #475569; }
    textarea    { width: 100%; height: 150px; padding: 10px; font-size: 15px; border: 1px solid #cbd5e1; border-radius: 8px; }
    button      { margin-top: 10px; padding: 10px 24px; background: #2563eb; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 15px; }
    button:hover{ background: #1d4ed8; }
    #result     { margin-top: 24px; font-size: 22px; font-weight: bold; }
    .FAKE       { color: #dc2626; }
    .REAL       { color: #16a34a; }
  </style>
</head>
<body>
  <h1>🔍 Fake News Detector</h1>
  <p>Paste a news article or headline below and click Detect.</p>
  <textarea id="newsText" placeholder="Enter news text here..."></textarea>
  <br />
  <button onclick="detect()">Detect</button>
  <div id="result"></div>

  <script>
    async function detect() {
      const text = document.getElementById('newsText').value;
      if (!text.trim()) return alert('Please enter some text.');

      const res  = await fetch('/predict', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ text })
      });

      const data = await res.json();
      const div  = document.getElementById('result');
      div.className   = data.label;
      div.textContent = `${data.label} — ${data.confidence}% confidence`;
    }
  </script>
</body>
</html>
